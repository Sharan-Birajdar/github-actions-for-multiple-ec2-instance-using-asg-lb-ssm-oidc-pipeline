name: Deploy to ASG via SSM (OIDC)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ASG_NAME: ${{ secrets.ASG_NAME }}
  TARGET_GROUP_ARN: ${{ secrets.TARGET_GROUP_ARN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Instances in ASG
        id: instances
        run: |
          IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:aws:autoscaling:groupName,Values=$ASG_NAME" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text | tr '\n' ' ')

          if [ -z "$IDS" ]; then
            echo "No running instances found!"
            exit 1
          fi

          echo "Instances: $IDS"
          echo "ids=$IDS" >> "$GITHUB_OUTPUT"

      - name: Rolling Deploy using SSM
        run: |
          set -e

          for INSTANCE in ${{ steps.instances.outputs.ids }}
          do
            echo "======================================"
            echo "Processing $INSTANCE"
            echo "======================================"

            STATE=$(aws ec2 describe-instances \
              --instance-ids $INSTANCE \
              --query "Reservations[0].Instances[0].State.Name" \
              --output text 2>/dev/null || echo "terminated")

            if [ "$STATE" != "running" ]; then
              echo "Skipping $INSTANCE (state: $STATE)"
              continue
            fi

            SSM_STATUS=$(aws ssm describe-instance-information \
              --query "InstanceInformationList[?InstanceId=='$INSTANCE'].PingStatus" \
              --output text)

            if [ "$SSM_STATUS" != "Online" ]; then
              echo "Skipping $INSTANCE (SSM not ready)"
              continue
            fi

            echo "Reducing deregistration delay..."
            aws elbv2 modify-target-group-attributes \
              --target-group-arn $TARGET_GROUP_ARN \
              --attributes Key=deregistration_delay.timeout_seconds,Value=30

            echo "Putting instance into standby..."
            aws autoscaling enter-standby \
              --instance-ids $INSTANCE \
              --auto-scaling-group-name $ASG_NAME \
              --should-decrement-desired-capacity

            echo "Waiting for Standby..."
            for i in $(seq 1 20); do
              STATE=$(aws autoscaling describe-auto-scaling-instances \
                --instance-ids $INSTANCE \
                --query "AutoScalingInstances[0].LifecycleState" \
                --output text)

              [ "$STATE" = "Standby" ] && break
              sleep 10
            done

            echo "Deploying via SSM..."

            COMMAND_ID=$(aws ssm send-command \
              --instance-ids $INSTANCE \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy Application" \
              --query "Command.CommandId" \
              --parameters commands='[
                "cd /var/www/html",
                "if [ ! -d \".git\" ]; then sudo rm -rf * && sudo git clone https://github.com/YOUR_USERNAME/YOUR_REPO .; fi",
                "sudo git fetch --all",
                "sudo git reset --hard origin/main",
                "sudo chown -R ec2-user:ec2-user /var/www/html",
                "sudo systemctl restart nginx"
              ]' \
              --output text)

            aws ssm wait command-executed \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE

            echo "Deployment output:"
            aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE \
              --query "{Status: Status, Output: StandardOutputContent, Error: StandardErrorContent}" \
              --output text

            echo "Restoring deregistration delay..."
            aws elbv2 modify-target-group-attributes \
              --target-group-arn $TARGET_GROUP_ARN \
              --attributes Key=deregistration_delay.timeout_seconds,Value=300

            echo "Bringing instance back..."
            aws autoscaling exit-standby \
              --instance-ids $INSTANCE \
              --auto-scaling-group-name $ASG_NAME

            echo "Waiting for InService..."
            for i in $(seq 1 20); do
              STATE=$(aws autoscaling describe-auto-scaling-instances \
                --instance-ids $INSTANCE \
                --query "AutoScalingInstances[0].LifecycleState" \
                --output text)

              [ "$STATE" = "InService" ] && break
              sleep 10
            done

            echo "$INSTANCE deployed successfully"
          done
