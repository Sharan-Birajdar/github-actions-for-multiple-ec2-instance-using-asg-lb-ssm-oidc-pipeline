name: Deploy to ASG via SSM (OIDC)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ASG_NAME: ${{ secrets.ASG_NAME }}
  TARGET_GROUP_ARN: ${{ secrets.TARGET_GROUP_ARN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 OIDC Authentication
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔍 Get Running Instances from ASG
      - name: Get Instances in ASG
        id: instances
        run: |
          IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:aws:autoscaling:groupName,Values=$ASG_NAME" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text | tr '\n' ' ')

          if [ -z "$IDS" ]; then
            echo "❌ No running instances found!"
            exit 1
          fi

          echo "Instances: $IDS"
          echo "ids=$IDS" >> $GITHUB_OUTPUT

      # 🔁 Safe Rolling Deployment
      - name: Rolling Deploy using SSM (Safe)
        run: |
          set -e

          for INSTANCE in ${{ steps.instances.outputs.ids }}
          do
            echo "======================================"
            echo "🚀 Processing $INSTANCE"
            echo "======================================"

            # ✅ Check instance state
            STATE=$(aws ec2 describe-instances \
              --instance-ids $INSTANCE \
              --query "Reservations[0].Instances[0].State.Name" \
              --output text 2>/dev/null || echo "terminated")

            if [ "$STATE" != "running" ]; then
              echo "❌ Skipping $INSTANCE (state: $STATE)"
              continue
            fi

            # ✅ Check SSM availability
            SSM_STATUS=$(aws ssm describe-instance-information \
              --query "InstanceInformationList[?InstanceId=='$INSTANCE'].PingStatus" \
              --output text)

            if [ "$SSM_STATUS" != "Online" ]; then
              echo "❌ Skipping $INSTANCE (SSM not ready)"
              continue
            fi

            # ✅ Reduce deregistration delay to speed up standby
            echo "⚡ Reducing deregistration delay to 30s..."
            aws elbv2 modify-target-group-attributes \
              --target-group-arn $TARGET_GROUP_ARN \
              --attributes Key=deregistration_delay.timeout_seconds,Value=30

            # ✅ Put instance in standby (decrement desired so no new instance launches)
            echo "➡️ Putting instance into standby..."
            aws autoscaling enter-standby \
              --instance-ids $INSTANCE \
              --auto-scaling-group-name $ASG_NAME \
              --should-decrement-desired-capacity

            # ✅ Wait until instance is actually in Standby
            echo "⏳ Waiting for instance to reach Standby state..."
            for i in $(seq 1 20); do
              STANDBY_STATE=$(aws autoscaling describe-auto-scaling-instances \
                --instance-ids $INSTANCE \
                --query "AutoScalingInstances[0].LifecycleState" \
                --output text)
              echo "  Current state: $STANDBY_STATE"
              if [ "$STANDBY_STATE" = "Standby" ]; then
                echo "✅ Instance is in Standby"
                break
              fi
              if [ $i -eq 20 ]; then
                echo "❌ Timed out waiting for Standby state"
                exit 1
              fi
              sleep 10
            done

            # ✅ Deploy via SSM
            echo "⚙️ Deploying application..."
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids $INSTANCE \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy Application" \
              --query "Command.CommandId" \
              --parameters commands='[
                "cd /var/www/html",
                "if [ -d \".git\" ]; then sudo git reset --hard && sudo git pull origin main; else sudo git clone https://github.com/YOUR_USERNAME/YOUR_REPO .; fi",
                "sudo systemctl reload nginx"
              ]' \
              --output text)

            echo "🕒 Waiting for deployment..."
            aws ssm wait command-executed \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE

            # ✅ Fetch and show command output
            echo "📋 Deployment output:"
            aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE \
              --query "{Status: Status, Output: StandardOutputContent, Error: StandardErrorContent}" \
              --output text

            # ✅ Restore deregistration delay back to 300s
            echo "🔁 Restoring deregistration delay to 300s..."
            aws elbv2 modify-target-group-attributes \
              --target-group-arn $TARGET_GROUP_ARN \
              --attributes Key=deregistration_delay.timeout_seconds,Value=300

            # ✅ Bring instance back
            echo "⬅️ Bringing instance back to service..."
            aws autoscaling exit-standby \
              --instance-ids $INSTANCE \
              --auto-scaling-group-name $ASG_NAME

            # ✅ Poll until instance is back InService
            echo "⏳ Waiting for instance to be InService..."
            for i in $(seq 1 20); do
              IN_SERVICE_STATE=$(aws autoscaling describe-auto-scaling-instances \
                --instance-ids $INSTANCE \
                --query "AutoScalingInstances[0].LifecycleState" \
                --output text)
              echo "  Current state: $IN_SERVICE_STATE"
              if [ "$IN_SERVICE_STATE" = "InService" ]; then
                echo "✅ Instance is back InService"
                break
              fi
              if [ $i -eq 20 ]; then
                echo "❌ Timed out waiting for InService state"
                exit 1
              fi
              sleep 10
            done

            echo "✅ $INSTANCE deployed successfully"
          done
